name: Build and Upload Release Assets

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-assets:
    name: Build and Upload Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux-amd64, linux-arm64, windows]
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install Linux packaging tools
        if: matrix.target != 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Determine Version
        id: get_version
        run: |
          VERSION_NUMBER=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          echo "Using release tag version: $VERSION_NUMBER"
          echo "VERSION=$VERSION_NUMBER" >> $GITHUB_ENV
      - name: Clone private ebpf module
        if: matrix.target != 'windows'
        run: |
          git clone https://x-access-token:${{ secrets.GHCR_PAT }}@github.com/kloudmate/kloudmate-ebpf-programs.git /tmp/km-ebpf
          cd /tmp/km-ebpf && make docker-generate
      - name: Build Linux packages (amd64)
        if: matrix.target == 'linux-amd64'
        run: |
          make VERSION=${{ env.VERSION }} GOARCH=amd64 package-linux-deb
          make VERSION=${{ env.VERSION }} GOARCH=amd64 package-linux-rpm
      - name: Build Linux packages (arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          make VERSION=${{ env.VERSION }} GOARCH=arm64 package-linux-deb
          make VERSION=${{ env.VERSION }} GOARCH=arm64 package-linux-rpm
      - name: Build Windows Installer package (using Docker via make)
        if: matrix.target == 'windows'
        run: make VERSION=${{ env.VERSION }} package-windows
      - name: List build artifacts
        run: |
          ls -l dist/ || true
          ls -l dist/rpm-x86_64/RPMS/x86_64/ || true
          ls -l dist/rpm-aarch64/RPMS/aarch64/ || true
          ls -l dist/win/ || true
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*.deb
            dist/rpm-*/RPMS/*/*.rpm
            dist/win/*.exe